<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <header>
        <div class="container nav">

            <div class="titulo">
                <h2>Tênis de Mesa</h2>
            </div>

            <div class="botoes">
                <button class="Blogin">Login</button>
                <button class="Bcadastro">Cadastro</button>
            </div>

        </div>
    </header>


    <div class="cadastro">
        <div class="fundo">
            <img src="logoPing.png" alt="">
            <h1>Criar Conta</h1>

            <div class="email">
                <h4>Email:</h4>
                <input type="text" id="input_email">
            </div>

            <div class="nome">
                <h4>Nome Completo:</h4>
                <input type="text" id="input_nome">
            </div>

            <div class="senha">
                <h4>Senha:</h4>
                <input type="text" id="input_senha">
            </div>

            <div class="senha">
                <h4>Confirme a senha:</h4>
                <input type="text" id="input_senha">
            </div>

            <div class="botoes btnCadastro">
                <button>Cadastrar</button>
            </div>

            <p>Já tem uma conta? <a href="pagLogin.html">Fazer login</a></p>

        </div>

    </div>

</body>

</html>
