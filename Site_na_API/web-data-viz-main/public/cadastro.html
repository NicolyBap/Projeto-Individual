<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tênis de mesa | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <div class="titulo">
        <img src="assets/imgs/logoPing.png" alt="">
        <h1 onclick="location.href='./index.html'">Tênis de Mesa</h1>
      </div>
      <ul class="navbar">
        <button onclick="location.href='./login.html'" class="Blogin">Login</button>
        <button onclick="location.href='./cadastro.html'" class="Bcadastro">Cadastro</button>

      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <img src="assets/imgs/logoPing.png" alt="">
        <h2>Criar Conta</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->

          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input onchange="email()" id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Gênero:</span>
            <input id="genero_input" type="text" placeholder="Gênero que se identifica" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input onchange="senha()" id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <p>Já tem uma conta? <a href="./login.html">Fazer login</a></p>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
    <span style="color: red;"></span>
  </div>

</html>

<script>

  let mensagem = "";
  let especiais = ["@", "#", "!", "$", "%"];

  function senha() {
    let senhaVar = senha_input.value;
    let senhaMinuscula = senhaVar.toLowerCase();
    let senhaTRUE = false;
    let temEspecial = false;

    mensagem = "";
    if (senhaVar.length < 6) {
      mensagem += `<span style="color: red;">- Min 6 caracteres</span><br>`;
    }

    for (let i = 0; i < especiais.length; i++) {
      if (senhaVar.includes(especiais[i])) {
        temEspecial = true;
      }
    }

    if (!temEspecial) {
      mensagem += `<span style="color: red;">- A senha precisa ter pelo menos um caractere especial: ( @, #, !, $, % )</span><br>`;
    }

    if (senhaVar == senhaMinuscula) {
      mensagem += `<span style="color: red;">- Min 1 letra maiúscula</span><br>`;
    }

    if (mensagem != "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = mensagem;
      return false;
    } else {
      senhaTRUE = true;
      cardErro.style.display = "none";
      return true;
    }
  }

  function email() {
    let email = email_input.value;


    if (!email.includes('@') || !email.includes('.')) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = `<span style="color: red;">- Digite um E-mail valido !</span><br>`;
      return false;

    } else {
      senhaTRUE = true;
      cardErro.style.display = "none";
      return true;
    }
  }


  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var generovar = genero_input.value;

    email();
    senha();

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      generovar == ""

    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Algum campo em branco!";
      finalizarAguardar();
      return false;
    }

    if (!senha() || !email()) {
      finalizarAguardar();
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não coincidem!";
      finalizarAguardar();
      return false;
    }


    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        generoServer: generovar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }


  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
